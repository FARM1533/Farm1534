<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DE FAMILY FARM</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;

            background: 
                linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                url("images/farm-bg.jpg"); /* your background image */

            background-size: cover;
            background-position: center;
            color: white;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }

        .logo {
            height: 60px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
        }

        .hero {
            text-align: center;
            margin-top: 120px;
        }

        .hero h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 18px;
            margin-bottom: 20px;
        }

        .btn {
            background: green;
            color: white;
            padding: 12px 25px;
            border: none;
            text-decoration: none;
            border-radius: 5px;
        }

        footer {
            text-align: center;
            margin-top: 150px;
            padding: 20px;
            font-size: 14px;
        }
    </style>
</head>

<body>

<header>
    <!-- LOGO -->
    <img src="images/logo.png" alt="Farm Logo" class="logo">

    <!-- NAVIGATION -->
    <nav>
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">Contact</a>
    </nav>
</header>

<!-- HERO SECTION -->
<section class="hero">
    <h1>Welcome to DE FAMILY FARM</h1>
    <p>Fresh farm products, straight from our land to your table</p>
    <a href="#" class="btn">Contact for Price</a>
</section>

<!-- FOOTER -->
<footer>
    <p>© 2026 DE FAMILY FARM. All rights reserved.</p>
</footer>

</body>
</html>
